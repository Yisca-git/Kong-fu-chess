<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Kong-Fu Chess – מעקב טסטים</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
    h1 { color: #333; }
    .form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 24px; background: #fff; padding: 16px; border-radius: 8px; box-shadow: 0 1px 4px #0001; }
    .form-row label { font-size: 13px; color: #555; display: flex; flex-direction: column; gap: 4px; }
    input[type=number], input[type=date] { padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; width: 90px; }
    input[type=text] { padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; width: 220px; }
    button { padding: 8px 20px; background: #2563eb; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; }
    button:hover { background: #1d4ed8; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px #0001; }
    th { background: #2563eb; color: #fff; padding: 10px 14px; text-align: right; }
    td { padding: 10px 14px; border-bottom: 1px solid #eee; }
    tr:last-child td { border-bottom: none; }
    .pct { font-weight: bold; }
    .good { color: #16a34a; }
    .mid  { color: #d97706; }
    .bad  { color: #dc2626; }
    .del-btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 16px; padding: 0; }
    .del-btn:hover { color: #dc2626; }
    #chart-wrap { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px #0001; margin-bottom: 24px; }
    canvas { width: 100% !important; }
    .summary { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .card { background: #fff; border-radius: 8px; padding: 16px 24px; box-shadow: 0 1px 4px #0001; flex: 1; min-width: 140px; text-align: center; }
    .card .num { font-size: 32px; font-weight: bold; }
    .card .lbl { font-size: 13px; color: #888; }
  </style>
</head>
<body>
<h1>🥋 Kong-Fu Chess – מעקב התקדמות טסטים</h1>

<div class="summary">
  <div class="card"><div class="num" id="s-total">—</div><div class="lbl">סה"כ טסטים</div></div>
  <div class="card"><div class="num good" id="s-passed">—</div><div class="lbl">עברו</div></div>
  <div class="card"><div class="num bad" id="s-failed">—</div><div class="lbl">נכשלו</div></div>
  <div class="card"><div class="num" id="s-pct">—</div><div class="lbl">אחוז הצלחה</div></div>
</div>

<div id="chart-wrap"><canvas id="chart" height="80"></canvas></div>

<div class="form-row">
  <label>תאריך
    <input type="date" id="f-date">
  </label>
  <label>עברו
    <input type="number" id="f-passed" min="0" placeholder="0">
  </label>
  <label>נכשלו
    <input type="number" id="f-failed" min="0" placeholder="0">
  </label>
  <label>הערה (אופציונלי)
    <input type="text" id="f-note" placeholder="למשל: הוספתי טסטים לביישוף">
  </label>
  <button onclick="addEntry()">הוסף רשומה</button>
</div>

<table id="tbl">
  <thead><tr><th>תאריך</th><th>עברו</th><th>נכשלו</th><th>סה"כ</th><th>%</th><th>הערה</th><th></th></tr></thead>
  <tbody id="tbody"></tbody>
</table>

<script id="injected-data" type="application/json">[{"date": "2026-07-08", "passed": 47, "failed": 0, "note": ""}, {"date": "2026-07-08", "passed": 47, "failed": 0, "note": ""}, {"date": "2026-07-08", "passed": 47, "failed": 0, "note": ""}, {"date": "2026-07-08", "passed": 47, "failed": 0, "note": ""}, {"date": "2026-07-08", "passed": 1, "failed": 1, "note": ""}, {"date": "2026-07-08", "passed": 75, "failed": 0, "note": ""}, {"date": "2026-07-08", "passed": 1, "failed": 1, "note": ""}, {"date": "2026-07-08", "passed": 75, "failed": 0, "note": ""}]</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
let chart;

function load() {
  return JSON.parse(document.getElementById('injected-data').textContent || '[]');
}
function save() {} // data is injected by run_tests.py, no localStorage needed

function pctClass(p) { return p >= 90 ? 'good' : p >= 60 ? 'mid' : 'bad'; }

function render() {
  const data = load();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  data.forEach((r, i) => {
    const total = r.passed + r.failed;
    const pct = total ? Math.round(r.passed / total * 100) : 0;
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${r.date}</td><td class="good">${r.passed}</td><td class="bad">${r.failed}</td><td>${total}</td>
      <td class="pct ${pctClass(pct)}">${pct}%</td><td>${r.note || ''}</td>
      <td><button class="del-btn" onclick="del(${i})">✕</button></td>`;
    tbody.appendChild(tr);
  });

  // summary from latest entry
  if (data.length) {
    const last = data[data.length - 1];
    const total = last.passed + last.failed;
    const pct = total ? Math.round(last.passed / total * 100) : 0;
    document.getElementById('s-total').textContent = total;
    document.getElementById('s-passed').textContent = last.passed;
    document.getElementById('s-failed').textContent = last.failed;
    document.getElementById('s-pct').textContent = pct + '%';
  }

  renderChart(data);
}

function renderChart(data) {
  const labels = data.map(r => r.date);
  const passed = data.map(r => r.passed);
  const failed = data.map(r => r.failed);
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'עברו', data: passed, backgroundColor: '#16a34a' },
        { label: 'נכשלו', data: failed, backgroundColor: '#dc2626' }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { position: 'top' } },
      scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true, ticks: { stepSize: 1 } } }
    }
  });
}

// default date to today
document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);
render();
</script>
</body>
</html>
